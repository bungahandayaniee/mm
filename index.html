<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABSENSI HIMASI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.4/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
        /* CSS ASLI DARI getCSS() - TIDAK ADA PERUBAHAN TAMPILAN */
        :root { --p: #2563eb; --s: #64748b; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: #1e293b; min-height: 100vh; display: flex; flex-direction: column; }
        
        .main-container { padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            border-radius: 24px; padding: 24px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); 
        }
        
        #reader { width: 100%; border-radius: 16px; overflow: hidden; border: none !important; }
        .camera-container { 
            position: relative; width: 100%; aspect-ratio: 3/4; 
            background: #000; border-radius: 16px; overflow: hidden; margin-bottom: 20px; 
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; }

        .btn { 
            width: 100%; padding: 14px; border-radius: 12px; border: none; 
            font-weight: 600; cursor: pointer; transition: all 0.3s; 
            display: flex; align-items: center; justify-content: center; gap: 8px; 
        }
        .btn-primary { background: var(--p); color: #fff; }
        
        /* Tambahkan CSS lainnya dari file q.txt Anda di sini agar visual tetap identik */
    </style>
</head>
<body>

    <div class="main-container">
        <div class="glass-card">
            <h2 style="margin-bottom:20px; text-align:center;">Absensi Mahasiswa</h2>
            
            <div id="scanner-section">
                <div id="reader"></div>
                <p style="text-align:center; margin-top:15px; color:var(--s);">Scan QR Code KTM Anda</p>
            </div>

            <div id="camera-section" style="display:none;">
                <div class="camera-container">
                    <video id="video" autoplay muted playsinline></video>
                </div>
                <button id="capture-btn" class="btn btn-primary">
                    <i data-lucide="camera"></i> Verifikasi Wajah
                </button>
            </div>
        </div>
    </div>

    <script>
        /* PENTING: Ganti dengan URL Web App Google Apps Script Anda */
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwAv7WL8yN7EjZIHgcEW3_C7fPElAmhHCwa-gb1AuROtawk6i6X5tXsjeUisHhsAVs7/exec";

        /* JAVASCRIPT ASLI DARI getStudentJS() DENGAN PENYESUAIAN VERCEL */
        let html5QrCode;

        async function initScanner() {
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                html5QrCode.stop().then(() => {
                    document.getElementById('scanner-section').style.display = 'none';
                    document.getElementById('camera-section').style.display = 'block';
                    startCamera(decodedText);
                });
            });
        }

        async function startCamera(id) {
            const video = document.getElementById('video');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
            } catch (err) {
                alert("Gagal membuka kamera. Pastikan izin diberikan.");
            }
        }

        // Fungsi kirim data menggunakan fetch (pengganti google.script.run)
        async function kirimData(payload) {
            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Menghindari masalah CORS di Apps Script
                    body: JSON.stringify(payload),
                    headers: { 'Content-Type': 'application/json' }
                });
                alert("Data berhasil dikirim!");
            } catch (e) {
                console.error("Error:", e);
            }
        }

        lucide.createIcons();
        initScanner();
    </script>
</body>
</html>
